name: CI

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore .\McpServer.slnx

      - name: Build
        run: dotnet build .\McpServer.slnx -c Release --no-restore -v minimal

      - name: Unit Tests
        run: dotnet test .\tests\McpServer.UnitTests\McpServer.UnitTests.csproj -c Release --no-build -v minimal

      - name: Integration Tests
        run: dotnet test .\tests\McpServer.IntegrationTests\McpServer.IntegrationTests.csproj -c Release --no-build -v minimal

      - name: Compute Package Version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $packageVersion = "${{ github.ref_name }}".TrimStart('v')
          "PACKAGE_VERSION=$packageVersion" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Pack Tool Package
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: dotnet pack .\src\McpServer.Host\McpServer.Host.csproj -c Release --no-build -p:PackageVersion=$env:PACKAGE_VERSION -o .\artifacts\nuget

      - name: Publish Tool Package
        if: startsWith(github.ref, 'refs/tags/v')
        run: dotnet nuget push .\artifacts\nuget\*.nupkg --source https://nuget.pkg.github.com/haxxornulled/index.json --api-key ${{ secrets.GITHUB_TOKEN }} --skip-duplicate